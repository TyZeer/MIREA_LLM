services:
  mongodb:
    image: mongo
    container_name: mongo_db
    ports:
      - 27017:27017
    volumes:
      - mongo:/data
    environment:
      - MONGO-INITDB_ROOT_USERNAME=tyzer
      - MONGO-INITDB_ROOT_PASSWORD=tyzer
  mongo-express:
    image: mongo-express
    container_name: mongo_express
    restart: always
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=tyzer
      - ME_CONFIG_MONGODB_ADMINPASSWORD=tyzer
      - ME_CONFIG_MONGODB_SERVER=mongo_db
volumes:
  mongo: {}